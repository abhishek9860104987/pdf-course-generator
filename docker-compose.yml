version: '3.8'

services:
  postgres:
    image: postgres:14-alpine
    container_name: courseai_db
    environment:
      POSTGRES_USER: courseai
      POSTGRES_PASSWORD: courseai_password
      POSTGRES_DB: courseai
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U courseai"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: courseai_backend
    environment:
      DATABASE_URL: postgresql://courseai:courseai_password@postgres:5432/courseai
      SECRET_KEY: your-secret-key-change-in-production
      GROQ_API_KEY: ${GROQ_API_KEY}
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET}
      UPLOAD_DIR: ./uploads
      MAX_FILE_SIZE: 10485760
      CORS_ORIGINS: http://localhost,http://localhost:3000
    volumes:
      - ./backend/uploads:/app/uploads
      - ./backend/vector_stores:/app/vector_stores
    ports:
      - "8000:8000"
    depends_on:
      postgres:
        condition: service_healthy
    command: >
      sh -c "
        python -m alembic upgrade head &&
        uvicorn app.main:app --host 0.0.0.0 --port 8000
      "

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: courseai_frontend
    environment:
      VITE_API_URL: http://localhost:8000/api
      VITE_GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID}
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  postgres_data:
